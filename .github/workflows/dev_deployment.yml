name: YesBima UAT deployment

on:
  workflow_dispatch:

env:
    GCP_ARTIFACT_REPO: yesbima-img-repo # to store docker images
    SERVICE: yesbima-dev
    REGION: asia-south1
    DB_INSTANCE: yesbima-dev

permissions:
  id-token: write
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      # 1. Get code - copy code repo to runner vm
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{secrets.GCP_WIF_PROVIDER}} #projects/894027204902/locations/global/workloadIdentityPools/github-pool-1/providers/github-pool
          service_account: ${{secrets.GCP_SA}} #roboticadmin@project-4f9b9827-0749-46e9-8b6.iam.gserviceaccount.com

      - name: debug GCP config list
        run: gcloud config list

      - name: docker configuration
        run : gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: build docker image
        id: build
        run: |
            IMAGE_TAG=$REGION-docker.pkg.dev/${{secrets.GCP_PROJECT_ID}}/$GCP_ARTIFACT_REPO/$SERVICE:$GITHUB_SHA
            docker build -t $IMAGE_TAG .
            echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: push docker image to GCP artifact registory
        run: docker push ${{steps.build.outputs.image}}

      - name: Deploy to Cloud Run
        run: |
            gcloud run deploy $SERVICE \
            --image ${{ steps.build.outputs.image }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=10 \
            --add-cloudsql-instances=${{secrets.GCP_PROJECT_ID}}:$REGION:$DB_INSTANCE
            --set-env-vars=\
            DB_HOST=${{secrets.DB_HOST}}
            DB_USER=${{secrets.DB_USER}}
            DB_PASSWORD=${{secrets.DB_PASSWORD}}

